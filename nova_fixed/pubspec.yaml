name: nova
description: Nova — Furina AI Assistant. Fully offline, always listening.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── LLM / AI ──────────────────────────────────────────────
  # llama_cpp_dart: ^0.1.0        # llama.cpp binding — add when integrating model

  # ── Local Database & Memory ───────────────────────────────
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  drift: ^2.18.0
  drift_flutter: ^0.2.1

  # ── Voice / Audio ─────────────────────────────────────────
  just_audio: ^0.9.39
  audio_session: ^0.1.21
  permission_handler: ^11.3.1

  # ── Android System / Overlay ──────────────────────────────
  flutter_overlay_window: ^0.3.1
  android_intent_plus: ^5.1.0
  device_apps: ^2.2.0

  # ── Connectivity ──────────────────────────────────────────
  connectivity_plus: ^6.0.3
  wifi_iot: ^0.3.19+1

  # ── Animation & Sprite ────────────────────────────────────
  flame: ^1.18.0

  # ── Networking ────────────────────────────────────────────
  http: ^1.2.1
  dio: ^5.5.0+1

  # ── Utilities ─────────────────────────────────────────────
  uuid: ^4.4.0
  intl: ^0.19.0
  collection: ^1.18.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/sprites/
    - assets/audio/
    - assets/models/
    - assets/memory/
